name: Cloud Source Conversion

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum pages to convert this run"
        required: false
        default: "3"
      raw_limit:
        description: "Maximum raw R2 objects to restore during test prep"
        required: false
        default: "1"
      pages:
        description: "Page range for newly-created PDF jobs"
        required: false
        default: "1-3"

concurrency:
  group: cloud-source-prep
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  source-prep:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      PYTHONPATH: src
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install source-prep dependencies
        run: python -m pip install -e ".[pdf]"

      - name: Preflight cloud secrets
        id: preflight
        shell: bash
        run: |
          missing=()
          for name in GEMINI_API_KEY R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY R2_BUCKET; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ -z "$R2_ACCOUNT_ID" ] && [ -z "$R2_ENDPOINT_URL" ]; then
            missing+=("R2_ACCOUNT_ID_or_R2_ENDPOINT_URL")
          fi
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            printf 'Missing cloud source-prep secret(s): %s\n' "${missing[*]}" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Prepare conversion queue from R2
        if: steps.preflight.outputs.ready == 'true'
        run: >
          python -m historic_doc_ingest.genealogy_wiki cloud-source-prep-heartbeat
          --root .
          --conversion-only
          --restore-limit "${{ github.event.inputs.raw_limit || '1' }}"
          --pages "${{ github.event.inputs.pages || '1-3' }}"
          --pages-per-job 25
          --batch-pages 1
          --queue-limit 20
          --stale-minutes 360

      - name: Convert missing pages with Gemini
        if: steps.preflight.outputs.ready == 'true'
        run: >
          python -m historic_doc_ingest.genealogy_wiki gemini-source-prep
          --root .
          --limit "${{ github.event.inputs.limit || '3' }}"
          --queue-limit 20
          --stale-minutes 360
          --lite-model gemini-2.5-flash-lite
          --pro-model gemini-2.5-pro
          --max-output-tokens-lite 65536
          --max-output-tokens-pro 65536
          --crop-count 4

      - name: Assemble converted Markdown
        if: steps.preflight.outputs.ready == 'true'
        run: >
          python -m historic_doc_ingest.genealogy_wiki cloud-source-prep-heartbeat
          --root .
          --conversion-only
          --restore-limit "${{ github.event.inputs.raw_limit || '1' }}"
          --pages "${{ github.event.inputs.pages || '1-3' }}"
          --pages-per-job 25
          --batch-pages 1
          --queue-limit 20
          --stale-minutes 360

      - name: Publish conversion outputs
        if: steps.preflight.outputs.ready == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python -m historic_doc_ingest.genealogy_wiki sync-github-database --root . --source-conversion-only --message "Cloud source conversion"
