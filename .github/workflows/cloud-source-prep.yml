name: Cloud Source Conversion

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum pages to convert this run"
        required: false
        default: "3"
      parallelism:
        description: "Maximum Gemini pages to convert at the same time"
        required: false
        default: "1"
      raw_limit:
        description: "Maximum raw R2 objects to restore during test prep"
        required: false
        default: "1"
      pages:
        description: "Page range for newly-created PDF jobs"
        required: false
        default: "1-3"
      new_pages_limit:
        description: "Maximum new missing PDF pages to job per source; 0 means no cap"
        required: false
        default: "0"
      discovery_limit:
        description: "Maximum rough Docling discovery pages to accept before Gemini"
        required: false
        default: "25"
      discovery_scan_limit:
        description: "Maximum queued pages to inspect with Docling discovery"
        required: false
        default: "80"
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: cloud-source-prep
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  source-prep:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      PYTHONPATH: src
      RUN_LIMIT: ${{ github.event_name == 'schedule' && '2000' || github.event.inputs.limit || '3' }}
      RUN_PARALLELISM: ${{ github.event_name == 'schedule' && '64' || github.event.inputs.parallelism || '1' }}
      RUN_RAW_LIMIT: ${{ github.event_name == 'schedule' && '10' || github.event.inputs.raw_limit || '1' }}
      RUN_PAGES: ${{ github.event_name == 'schedule' && '' || github.event.inputs.pages || '1-3' }}
      RUN_NEW_PAGES_LIMIT: ${{ github.event_name == 'schedule' && '3000' || github.event.inputs.new_pages_limit || '0' }}
      RUN_DISCOVERY_LIMIT: ${{ github.event_name == 'schedule' && '200' || github.event.inputs.discovery_limit || '25' }}
      RUN_DISCOVERY_SCAN_LIMIT: ${{ github.event_name == 'schedule' && '400' || github.event.inputs.discovery_scan_limit || '80' }}
      RUN_QUEUE_LIMIT: ${{ github.event_name == 'schedule' && '2400' || '20' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install source-prep dependencies
        run: python -m pip install -e ".[pdf,discovery]"

      - name: Preflight cloud secrets
        id: preflight
        shell: bash
        run: |
          missing=()
          for name in GEMINI_API_KEY R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY R2_BUCKET; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ -z "$R2_ACCOUNT_ID" ] && [ -z "$R2_ENDPOINT_URL" ]; then
            missing+=("R2_ACCOUNT_ID_or_R2_ENDPOINT_URL")
          fi
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            printf 'Missing cloud source-prep secret(s): %s\n' "${missing[*]}" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Prepare conversion queue from R2
        if: steps.preflight.outputs.ready == 'true'
        run: >
          python -m historic_doc_ingest.genealogy_wiki cloud-source-prep-heartbeat
          --root .
          --conversion-only
          --restore-limit "$RUN_RAW_LIMIT"
          --pages "$RUN_PAGES"
          --pages-per-job 25
          --new-pages-limit "$RUN_NEW_PAGES_LIMIT"
          --batch-pages 1
          --queue-limit "$RUN_QUEUE_LIMIT"
          --stale-minutes 360

      - name: Run rough Docling discovery
        if: steps.preflight.outputs.ready == 'true'
        timeout-minutes: 4
        continue-on-error: true
        run: >
          python -m historic_doc_ingest.genealogy_wiki source-prep-docling-discovery
          --root .
          --limit "$RUN_DISCOVERY_LIMIT"
          --scan-limit "$RUN_DISCOVERY_SCAN_LIMIT"
          --stale-minutes 360

      - name: Convert missing pages with Gemini
        if: steps.preflight.outputs.ready == 'true'
        run: >
          python -m historic_doc_ingest.genealogy_wiki gemini-source-prep
          --root .
          --limit "$RUN_LIMIT"
          --parallelism "$RUN_PARALLELISM"
          --queue-limit "$RUN_QUEUE_LIMIT"
          --stale-minutes 360
          --lite-model gemini-2.5-flash-lite
          --pro-model gemini-2.5-pro
          --max-output-tokens-lite 65536
          --max-output-tokens-pro 65536
          --crop-count 4

      - name: Assemble converted Markdown
        if: steps.preflight.outputs.ready == 'true'
        run: >
          python -m historic_doc_ingest.genealogy_wiki cloud-source-prep-heartbeat
          --root .
          --conversion-only
          --restore-limit "$RUN_RAW_LIMIT"
          --pages "$RUN_PAGES"
          --pages-per-job 25
          --new-pages-limit "$RUN_NEW_PAGES_LIMIT"
          --batch-pages 1
          --queue-limit "$RUN_QUEUE_LIMIT"
          --stale-minutes 360

      - name: Publish conversion outputs
        if: steps.preflight.outputs.ready == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python -m historic_doc_ingest.genealogy_wiki sync-github-database --root . --source-conversion-only --message "Cloud source conversion"
