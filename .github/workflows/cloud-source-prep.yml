name: Cloud Source Conversion

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum pages to convert this run"
        required: false
        default: "8000"
      parallelism:
        description: "Maximum Gemini pages to convert at the same time"
        required: false
        default: "128"
      raw_limit:
        description: "Maximum raw R2 objects to restore during test prep"
        required: false
        default: "500"
      source:
        description: "Optional raw source path or basename to restore/prepare/convert"
        required: false
        default: ""
      source_sha256:
        description: "Optional raw source SHA-256 to restore/prepare/convert"
        required: false
        default: ""
      pages:
        description: "Page range for newly-created PDF jobs"
        required: false
        default: ""
      new_pages_limit:
        description: "Maximum new missing PDF pages to job per source; 0 means no cap"
        required: false
        default: "8000"
      discovery_limit:
        description: "Maximum Docling-usable pages to accept; 0 means no accepted-page cap"
        required: false
        default: "0"
      discovery_scan_limit:
        description: "Maximum queued pages to inspect with Docling discovery"
        required: false
        default: "100"
      discovery_parallelism:
        description: "Maximum Docling pages to inspect concurrently"
        required: false
        default: "16"
      discovery_max_pages_per_source:
        description: "Maximum Docling-discovery pages per raw source per run"
        required: false
        default: "5"
      discovery_hard_timeout:
        description: "Hard timeout per Docling page in seconds"
        required: false
        default: "20"
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: cloud-source-prep
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  source-prep:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      PYTHONPATH: src
      PIP_NO_CACHE_DIR: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      RUN_LIMIT: ${{ github.event_name == 'schedule' && '8000' || github.event.inputs.limit || '8000' }}
      RUN_PARALLELISM: ${{ github.event_name == 'schedule' && '128' || github.event.inputs.parallelism || '128' }}
      RUN_RAW_LIMIT: ${{ github.event_name == 'schedule' && '500' || github.event.inputs.raw_limit || '500' }}
      RUN_SOURCE: ${{ github.event_name == 'schedule' && '' || github.event.inputs.source || '' }}
      RUN_SOURCE_SHA256: ${{ github.event_name == 'schedule' && '' || github.event.inputs.source_sha256 || '' }}
      RUN_PAGES: ${{ github.event_name == 'schedule' && '' || github.event.inputs.pages || '' }}
      RUN_NEW_PAGES_LIMIT: ${{ github.event_name == 'schedule' && '8000' || github.event.inputs.new_pages_limit || '8000' }}
      RUN_DISCOVERY_LIMIT: ${{ github.event_name == 'schedule' && '0' || github.event.inputs.discovery_limit || '0' }}
      RUN_DISCOVERY_SCAN_LIMIT: ${{ github.event_name == 'schedule' && '100' || github.event.inputs.discovery_scan_limit || '100' }}
      RUN_DISCOVERY_PARALLELISM: ${{ github.event_name == 'schedule' && '16' || github.event.inputs.discovery_parallelism || '16' }}
      RUN_DISCOVERY_MAX_PAGES_PER_SOURCE: ${{ github.event_name == 'schedule' && '5' || github.event.inputs.discovery_max_pages_per_source || '5' }}
      RUN_DISCOVERY_HARD_TIMEOUT: ${{ github.event_name == 'schedule' && '20' || github.event.inputs.discovery_hard_timeout || '20' }}
      RUN_QUEUE_LIMIT: ${{ github.event_name == 'schedule' && '10000' || '10000' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free runner disk for source-prep cache
        run: |
          echo "Disk before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /usr/local/share/powershell /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          echo "Disk after cleanup:"
          df -h

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install source-prep queue dependencies
        run: python -m pip install --no-cache-dir -e ".[pdf]"

      - name: Preflight cloud secrets
        id: preflight
        shell: bash
        run: >
          python -m historic_doc_ingest.genealogy_wiki source-prep-cloud-preflight
          --root .
          --github-output "$GITHUB_OUTPUT"
          --github-step-summary "$GITHUB_STEP_SUMMARY"

      - name: Publish source-prep preflight state
        if: steps.preflight.outputs.state_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          python -m historic_doc_ingest.genealogy_wiki sync-github-database --root . --source-conversion-only --message "Cloud source prep preflight state"

      - name: Prepare conversion queue from R2
        if: steps.preflight.outputs.ready == 'true'
        run: >
          python -m historic_doc_ingest.genealogy_wiki cloud-source-prep-heartbeat
          --root .
          --conversion-only
          --restore-limit "$RUN_RAW_LIMIT"
          --source "$RUN_SOURCE"
          --source-sha256 "$RUN_SOURCE_SHA256"
          --pages "$RUN_PAGES"
          --pages-per-job 25
          --defer-page-images
          --no-job-source-copy
          --new-pages-limit "$RUN_NEW_PAGES_LIMIT"
          --batch-pages 1
          --queue-limit "$RUN_QUEUE_LIMIT"
          --stale-minutes 360

      - name: Publish restore and queue checkpoint
        if: steps.preflight.outputs.ready == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          python -m historic_doc_ingest.genealogy_wiki sync-github-database --root . --source-conversion-only --message "Cloud source prep restore checkpoint"

      - name: Install Docling discovery dependencies
        if: steps.preflight.outputs.ready == 'true'
        shell: bash
        run: |
          echo "Disk before Docling dependency install:"
          df -h
          python -m pip install --no-cache-dir --index-url https://download.pytorch.org/whl/cpu torch torchvision
          python -m pip install --no-cache-dir -e ".[discovery]"
          python -m pip cache purge || true
          echo "Disk after Docling dependency install:"
          df -h

      - name: Run Docling baseline on all queued pages
        if: steps.preflight.outputs.ready == 'true'
        timeout-minutes: 90
        run: >
          python -m historic_doc_ingest.genealogy_wiki source-prep-docling-discovery
          --root .
          --limit "$RUN_DISCOVERY_LIMIT"
          --scan-limit "$RUN_DISCOVERY_SCAN_LIMIT"
          --max-pages-per-source "$RUN_DISCOVERY_MAX_PAGES_PER_SOURCE"
          --parallelism "$RUN_DISCOVERY_PARALLELISM"
          --no-ocr
          --document-timeout 10
          --hard-timeout "$RUN_DISCOVERY_HARD_TIMEOUT"
          --source "$RUN_SOURCE"
          --source-sha256 "$RUN_SOURCE_SHA256"
          --stale-minutes 360

      - name: Publish Docling checkpoint
        if: steps.preflight.outputs.ready == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          python -m historic_doc_ingest.genealogy_wiki sync-github-database --root . --source-conversion-only --message "Cloud source prep Docling checkpoint"

      - name: Convert missing pages with Gemini
        if: steps.preflight.outputs.ready == 'true'
        run: >
          python -m historic_doc_ingest.genealogy_wiki gemini-source-prep
          --root .
          --limit "$RUN_LIMIT"
          --parallelism "$RUN_PARALLELISM"
          --queue-limit "$RUN_QUEUE_LIMIT"
          --source "$RUN_SOURCE"
          --source-sha256 "$RUN_SOURCE_SHA256"
          --stale-minutes 360
          --lite-model gemini-2.5-flash
          --pro-model gemini-2.5-pro
          --max-output-tokens-lite 65536
          --max-output-tokens-pro 65536
          --crop-count 4

      - name: Assemble converted Markdown
        if: steps.preflight.outputs.ready == 'true'
        run: >
          python -m historic_doc_ingest.genealogy_wiki cloud-source-prep-heartbeat
          --root .
          --conversion-only
          --restore-limit "$RUN_RAW_LIMIT"
          --source "$RUN_SOURCE"
          --source-sha256 "$RUN_SOURCE_SHA256"
          --pages "$RUN_PAGES"
          --pages-per-job 25
          --defer-page-images
          --no-job-source-copy
          --new-pages-limit "$RUN_NEW_PAGES_LIMIT"
          --batch-pages 1
          --queue-limit "$RUN_QUEUE_LIMIT"
          --stale-minutes 360

      - name: Refresh global queue after source-filtered validation
        if: steps.preflight.outputs.ready == 'true'
        shell: bash
        run: |
          if [ -n "$RUN_SOURCE" ] || [ -n "$RUN_SOURCE_SHA256" ]; then
            python -m historic_doc_ingest.genealogy_wiki source-prep-batches \
              --root . \
              --max-pages 1 \
              --limit "$RUN_QUEUE_LIMIT" \
              --stale-minutes 360
          fi

      - name: Summarize source-prep run
        if: always() && steps.preflight.outputs.ready == 'true'
        run: python -m historic_doc_ingest.genealogy_wiki source-prep-cloud-report --root . >> "$GITHUB_STEP_SUMMARY"

      - name: Rebase before publishing conversion outputs
        if: steps.preflight.outputs.ready == 'true'
        run: git pull --rebase --autostash origin main

      - name: Publish conversion outputs
        if: steps.preflight.outputs.ready == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python -m historic_doc_ingest.genealogy_wiki sync-github-database --root . --source-conversion-only --message "Cloud source conversion"
