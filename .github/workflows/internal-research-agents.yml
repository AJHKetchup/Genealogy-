name: Internal Research Agents
# Hosted post-conversion research loop. Source conversion remains in cloud-source-prep.yml.

on:
  push:
    paths:
      - ".github/workflows/internal-research-agents.yml"
      - "scripts/post-conversion-agent-controller.ps1"
      - "src/historic_doc_ingest/**"
      - "research/_automation/**"
  schedule:
    - cron: "17 * * * *"
    - cron: "47 * * * *"
  workflow_dispatch:
    inputs:
      max_workers:
        description: "Parallel Codex workers"
        required: false
        default: "3"
      queue_limit:
        description: "Maximum queued tasks to consider"
        required: false
        default: "12"
      run_minutes:
        description: "Controller run window before draining workers"
        required: false
        default: "45"
      allow_promotion:
        description: "Allow reviewed canonical wiki promotion"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: internal-research-agents-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post-conversion-agents:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-latest
    timeout-minutes: 120
    env:
      PYTHONPATH: src
      CODEX_HOME: ${{ github.workspace }}/.codex-runtime
      CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
      CODEX_AUTH_JSON_B64: ${{ secrets.CODEX_AUTH_JSON_B64 }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: core.longpaths
      GIT_CONFIG_VALUE_0: "true"
      MAX_WORKERS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.max_workers || '3' }}
      QUEUE_LIMIT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.queue_limit || '12' }}
      RUN_INTERNAL: "true"
      RUN_MINUTES: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_minutes || github.event_name == 'push' && '10' || '25' }}
      WORKER_TIMEOUT_MINUTES: ${{ github.event_name == 'push' && '10' || '15' }}
      ALLOW_PROMOTION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.allow_promotion || github.event_name == 'schedule' && 'true' || github.event_name == 'push' && 'true' || 'false' }}

    steps:
      - name: Enable Git long paths
        shell: pwsh
        run: git config --global core.longpaths true

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest main before agents
        shell: pwsh
        run: |
          git checkout main
          git pull --ff-only origin main

      - name: Check scheduled run freshness
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $runInternal = "true"
          if ("${{ github.event_name }}" -eq "schedule") {
            $statePath = "research/_agent-queues/post-conversion-controller-state.json"
            $freshMinutes = 50
            if (Test-Path -LiteralPath $statePath) {
              try {
                $state = Get-Content -LiteralPath $statePath -Raw | ConvertFrom-Json
                $updatedText = [string]$state.updated
                $updated = [datetimeoffset]::Parse($updatedText)
                $ageMinutes = ([datetimeoffset]::UtcNow - $updated).TotalMinutes
                $ageDisplay = [math]::Round($ageMinutes, 1)
                if ($ageMinutes -lt $freshMinutes) {
                  $runInternal = "false"
                  Write-Host "Skipping scheduled internal-agent run because controller state is $ageDisplay minutes old."
                }
                else {
                  Write-Host "Controller state is $ageDisplay minutes old; scheduled run will proceed."
                }
              }
              catch {
                Write-Warning "Could not parse controller freshness; scheduled run will proceed. $($_.Exception.Message)"
              }
            }
            else {
              Write-Host "No controller state found; scheduled run will proceed."
            }
          }
          "RUN_INTERNAL=$runInternal" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Set up Node
        if: env.RUN_INTERNAL != 'false'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        if: env.RUN_INTERNAL != 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and Codex CLI
        if: env.RUN_INTERNAL != 'false'
        shell: pwsh
        run: |
          python -m pip install -e ".[pdf]"
          npm install -g @openai/codex
          codex --version

      - name: Restore ChatGPT-managed Codex auth
        if: env.RUN_INTERNAL != 'false'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          foreach ($name in @("CODEX_API_KEY", "OPENAI_API_KEY", "ANTHROPIC_API_KEY", "GOOGLE_GENERATIVE_AI_API_KEY", "GEMINI_API_KEY")) {
            if (-not [string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "Provider API key $name is set. Internal research agents must use ChatGPT-managed Codex auth, not provider API keys."
            }
          }

          New-Item -ItemType Directory -Force -Path $env:CODEX_HOME | Out-Null
          $authPath = Join-Path $env:CODEX_HOME "auth.json"

          if (-not [string]::IsNullOrWhiteSpace($env:CODEX_AUTH_JSON_B64)) {
            $authJson = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($env:CODEX_AUTH_JSON_B64))
          }
          elseif (-not [string]::IsNullOrWhiteSpace($env:CODEX_AUTH_JSON)) {
            $authJson = $env:CODEX_AUTH_JSON
          }
          else {
            throw "Missing CODEX_AUTH_JSON or CODEX_AUTH_JSON_B64 repository secret."
          }

          Set-Content -LiteralPath $authPath -Value $authJson -NoNewline -Encoding UTF8
          Set-Content -LiteralPath (Join-Path $env:CODEX_HOME "config.toml") -Value 'cli_auth_credentials_store = "file"' -Encoding UTF8

          $auth = Get-Content -LiteralPath $authPath -Raw | ConvertFrom-Json
          if ($auth.auth_mode -ne "chatgpt") {
            throw "Codex auth secret must have auth_mode=chatgpt."
          }
          if ($null -eq $auth.tokens -or [string]::IsNullOrWhiteSpace($auth.tokens.refresh_token)) {
            throw "Codex auth secret is missing a refresh token."
          }

      - name: Verify Codex session starts
        if: env.RUN_INTERNAL != 'false'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $logDir = "research/_agent-queues/post-conversion-run-logs"
          New-Item -ItemType Directory -Force -Path $logDir | Out-Null
          $verifyLog = Join-Path $logDir "codex-verify-latest.log"
          "Codex verify started $(Get-Date -AsUTC -Format o)" | Set-Content -LiteralPath $verifyLog -Encoding UTF8
          $reply = & codex exec --ephemeral --sandbox read-only "Reply with exactly one token: OK" 2>&1
          $exitCode = if ($null -eq $LASTEXITCODE) { 0 } else { $LASTEXITCODE }
          "CODEX_VERIFY_EXIT_CODE=$exitCode" | Out-File -FilePath $env:GITHUB_ENV -Append
          "exit_code=$exitCode" | Add-Content -LiteralPath $verifyLog -Encoding UTF8
          $reply | Tee-Object -FilePath $verifyLog -Append | ForEach-Object { Write-Host $_ }
          if ($exitCode -ne 0) {
            throw "Codex session failed with exit code $exitCode."
          }
          $ok = @($reply | Where-Object { $_.ToString().Trim() -match '^OK\.?$' }).Count -gt 0
          if (-not $ok) {
            throw "Codex session did not return OK."
          }

      - name: Restore proof-review source assets
        if: env.RUN_INTERNAL != 'false'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          python -m historic_doc_ingest.genealogy_wiki source-relevance sync-review-holds --root .
          python -m historic_doc_ingest.genealogy_wiki source-relevance restore-review-assets --root . --limit 24

      - name: Run internal post-conversion agents
        if: env.RUN_INTERNAL != 'false'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $logDir = "research/_agent-queues/post-conversion-run-logs"
          New-Item -ItemType Directory -Force -Path $logDir | Out-Null
          $logPath = Join-Path $logDir "internal-agents-latest.log"
          $controllerArgs = @(
            "-NoProfile",
            "-ExecutionPolicy", "Bypass",
            "-File", "scripts/post-conversion-agent-controller.ps1",
            "-Root", ".",
            "-RunMinutes", $env:RUN_MINUTES,
            "-MaxWorkers", $env:MAX_WORKERS,
            "-QueueLimit", $env:QUEUE_LIMIT,
            "-PollSeconds", "45",
            "-WaitForWorkers",
            "-WorkerTimeoutMinutes", $env:WORKER_TIMEOUT_MINUTES
          )
          $output = & powershell @controllerArgs 2>&1
          $exitCode = if ($null -eq $LASTEXITCODE) { 0 } else { $LASTEXITCODE }
          $output | Tee-Object -FilePath $logPath
          "INTERNAL_AGENT_EXIT_CODE=$exitCode" | Out-File -FilePath $env:GITHUB_ENV -Append
          "INTERNAL_AGENT_LOG=$logPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          if ($exitCode -ne 0) {
            Write-Warning "Internal agent controller exited with $exitCode. Safe outputs and diagnostics will still be published for the next run."
          }

      - name: Run safe wiki promotion agents
        if: env.RUN_INTERNAL != 'false' && env.ALLOW_PROMOTION == 'true' && env.INTERNAL_AGENT_EXIT_CODE == '0'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $logDir = "research/_agent-queues/post-conversion-run-logs"
          New-Item -ItemType Directory -Force -Path $logDir | Out-Null
          $logPath = Join-Path $logDir "wiki-promotion-latest.log"
          $promotionArgs = @(
            "-NoProfile",
            "-ExecutionPolicy", "Bypass",
            "-File", "scripts/post-conversion-agent-controller.ps1",
            "-Root", ".",
            "-Once",
            "-AllowPromotion",
            "-PromotionOnly",
            "-MaxWorkers", "1",
            "-QueueLimit", "3",
            "-PollSeconds", "45",
            "-WaitForWorkers",
            "-WorkerTimeoutMinutes", $env:WORKER_TIMEOUT_MINUTES
          )
          $output = & powershell @promotionArgs 2>&1
          $exitCode = if ($null -eq $LASTEXITCODE) { 0 } else { $LASTEXITCODE }
          $output | Tee-Object -FilePath $logPath
          "PROMOTION_EXIT_CODE=$exitCode" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PROMOTION_LOG=$logPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          if ($exitCode -ne 0) {
            Write-Warning "Promotion controller exited with $exitCode. Safe outputs and diagnostics will still be published for the next run."
          }

      - name: Release cancelled internal worker leases
        if: cancelled() && env.RUN_INTERNAL != 'false'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $statePath = "research/_agent-queues/post-conversion-controller-state.json"
          if (-not (Test-Path -LiteralPath $statePath)) {
            Write-Host "No controller state file to clean."
            exit 0
          }
          $state = Get-Content -LiteralPath $statePath -Raw | ConvertFrom-Json
          $activeWorkers = @($state.active_workers)
          foreach ($worker in $activeWorkers) {
            $taskIds = @($worker.task_ids | ForEach-Object { [string]$_ } | Where-Object { $_ })
            if ($taskIds.Count -gt 0) {
              python -m historic_doc_ingest.genealogy_wiki agent-task release @taskIds --root . --agent ([string]$worker.worker) --note "hosted internal-agent run was cancelled before worker drain" --no-refresh
            }
          }
          $now = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $state.updated = $now
          $state.active_workers = @()
          if ($null -ne $state.last_summary) {
            $state.last_summary.active_workers_after = 0
            if ($null -eq $state.last_summary.blockers) {
              $state.last_summary | Add-Member -NotePropertyName blockers -NotePropertyValue @()
            }
            $state.last_summary.blockers += "hosted internal-agent run was cancelled before worker drain; released active worker leases"
            $state.last_summary.finished = $now
          }
          $state | ConvertTo-Json -Depth 14 | Set-Content -LiteralPath $statePath -Encoding UTF8

      - name: Rotate ChatGPT-managed Codex auth secret
        if: always() && env.RUN_INTERNAL != 'false' && env.CODEX_VERIFY_EXIT_CODE == '0'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.CODEX_SECRET_UPDATE_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $logDir = "research/_agent-queues/post-conversion-run-logs"
          New-Item -ItemType Directory -Force -Path $logDir | Out-Null
          $rotateLog = Join-Path $logDir "codex-auth-rotation-latest.log"
          "Codex auth rotation started $(Get-Date -AsUTC -Format o)" | Set-Content -LiteralPath $rotateLog -Encoding UTF8
          $exitCode = 0
          try {
            if ([string]::IsNullOrWhiteSpace($env:GH_TOKEN)) {
              throw "Missing CODEX_SECRET_UPDATE_TOKEN. Add a GitHub token with repository Secrets write permission so hosted Codex auth can rotate after refresh."
            }
            if (-not (Get-Command gh -ErrorAction SilentlyContinue)) {
              throw "GitHub CLI 'gh' is unavailable on this runner; cannot rotate CODEX_AUTH_JSON_B64."
            }
            gh --version | Add-Content -LiteralPath $rotateLog -Encoding UTF8
            $authPath = Join-Path $env:CODEX_HOME "auth.json"
            if (-not (Test-Path -LiteralPath $authPath)) {
              throw "Codex auth file was not found at $authPath."
            }
            $authJson = Get-Content -LiteralPath $authPath -Raw
            $auth = $authJson | ConvertFrom-Json
            if ($auth.auth_mode -ne "chatgpt" -or $null -eq $auth.tokens -or [string]::IsNullOrWhiteSpace($auth.tokens.refresh_token)) {
              throw "Refusing to rotate Codex auth secret because auth.json is not a ChatGPT auth file with a refresh token."
            }
            $encoded = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($authJson))
            # gh 2.92 reads the secret value from stdin when --body is omitted.
            $ghOutput = $encoded | gh secret set CODEX_AUTH_JSON_B64 --repo $env:GITHUB_REPOSITORY 2>&1
            $ghExitCode = if ($null -eq $LASTEXITCODE) { 0 } else { $LASTEXITCODE }
            if ($ghOutput) {
              $ghOutput | Add-Content -LiteralPath $rotateLog -Encoding UTF8
            }
            if ($ghExitCode -ne 0) {
              throw "gh secret set failed with exit code $ghExitCode."
            }
            "rotation=success" | Add-Content -LiteralPath $rotateLog -Encoding UTF8
          }
          catch {
            $exitCode = 1
            "rotation=failure" | Add-Content -LiteralPath $rotateLog -Encoding UTF8
            $_.Exception.Message | Add-Content -LiteralPath $rotateLog -Encoding UTF8
            Write-Warning "Codex auth rotation failed. Safe outputs and diagnostics will still be published."
          }
          finally {
            "CODEX_ROTATE_EXIT_CODE=$exitCode" | Out-File -FilePath $env:GITHUB_ENV -Append
          }
          exit 0

      - name: Publish internal research outputs
        if: always() && env.RUN_INTERNAL != 'false'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python -m historic_doc_ingest.genealogy_wiki sync-github-database --root . --internal-research-only --refresh-base --message "Run internal research agents"

      - name: Mark controller failure after durable publish
        if: always() && env.RUN_INTERNAL != 'false' && (env.INTERNAL_AGENT_EXIT_CODE != '' && env.INTERNAL_AGENT_EXIT_CODE != '0' || env.PROMOTION_EXIT_CODE != '' && env.PROMOTION_EXIT_CODE != '0' || env.CODEX_ROTATE_EXIT_CODE != '' && env.CODEX_ROTATE_EXIT_CODE != '0')
        shell: pwsh
        run: |
          Write-Error "Internal research agents recorded a controller or auth-rotation failure after publishing diagnostics. See research/_agent-queues/post-conversion-controller-state.json and post-conversion run logs."

      - name: Summarize agent state
        if: always()
        shell: pwsh
        run: |
          $state = "research/_agent-queues/post-conversion-controller-state.json"
          if (Test-Path -LiteralPath $state) {
            "## Internal research agent state" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            "````json" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            Get-Content -LiteralPath $state -Raw | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            "````" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          }
