name: Publish Wiki Site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "wiki/**"
      - "research/**"
      - "src/historic_doc_ingest/**"
      - "pyproject.toml"
      - ".github/workflows/wiki-site.yml"
  schedule:
    - cron: "41 * * * *"
  workflow_run:
    workflows:
      - Internal Research Agents
    types:
      - completed

concurrency:
  group: wiki-site
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish-worker:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.R2_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.R2_TOKEN_VALUE }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install -e .

      - name: Refresh wiki indexes
        env:
          PYTHONPATH: src
        run: |
          python -m historic_doc_ingest.genealogy_wiki index --root .
          python -m historic_doc_ingest.genealogy_wiki graph --root .
          python -m historic_doc_ingest.genealogy_wiki tree --root .

      - name: Build static wiki site
        env:
          PYTHONPATH: src
        run: python -m historic_doc_ingest.genealogy_wiki site --root . --out site

      - name: Check Cloudflare deploy credentials
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "CLOUDFLARE_ACCOUNT_ID or R2_ACCOUNT_ID secret is required"; exit 1; }
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "CLOUDFLARE_API_TOKEN or R2_TOKEN_VALUE secret is required"; exit 1; }

      - name: Deploy to Cloudflare Workers Static Assets
        run: npx --yes wrangler@latest deploy --config cloudflare/wiki-site/wrangler.jsonc
