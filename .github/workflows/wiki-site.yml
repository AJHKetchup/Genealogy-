name: Publish Wiki Site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "wiki/**"
      - "research/**"
      - "src/historic_doc_ingest/**"
      - "pyproject.toml"
      - ".github/workflows/wiki-site.yml"
  schedule:
    - cron: "41 * * * *"
  workflow_run:
    workflows:
      - Internal Research Agents
    types:
      - completed

# Site publishes are intentionally allowed to overlap with research runs.
# A stale publish check below prevents older site builds from force-pushing gh-pages.

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish-site:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install -e .

      - name: Refresh wiki indexes
        env:
          PYTHONPATH: src
        run: |
          python -m historic_doc_ingest.genealogy_wiki index --root .
          python -m historic_doc_ingest.genealogy_wiki graph --root .
          python -m historic_doc_ingest.genealogy_wiki tree --root .

      - name: Build static wiki site
        env:
          PYTHONPATH: src
        run: python -m historic_doc_ingest.genealogy_wiki site --root . --out site --wiki-only

      - name: Check site publish freshness
        run: |
          set -euo pipefail
          latest="$(git ls-remote origin refs/heads/main | cut -f1)"
          current="$(git rev-parse HEAD)"
          if [ "$current" != "$latest" ]; then
            echo "SKIP_SITE_PUBLISH=true" >> "$GITHUB_ENV"
            echo "Skipping site publish because this run built $current but main is now $latest."
          else
            echo "SKIP_SITE_PUBLISH=false" >> "$GITHUB_ENV"
          fi

      - name: Publish site branch
        if: env.SKIP_SITE_PUBLISH != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cd site
          touch .nojekyll
          git init -b gh-pages
          git add -A
          git commit -m "Publish family wiki site"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages:gh-pages

      - name: Configure GitHub Pages for site branch
        if: env.SKIP_SITE_PUBLISH != 'true'
        env:
          GH_TOKEN: ${{ secrets.PAGES_ADMIN_TOKEN || secrets.CODEX_SECRET_UPDATE_TOKEN || github.token }}
        run: |
          set -euo pipefail
          if gh api "repos/${GITHUB_REPOSITORY}/pages" >/dev/null 2>&1; then
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/pages" \
              -f "source[branch]=gh-pages" \
              -f "source[path]=/" \
              -f build_type=legacy
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/pages" \
              -f "source[branch]=gh-pages" \
              -f "source[path]=/" \
              -f build_type=legacy
          fi
          gh api "repos/${GITHUB_REPOSITORY}/pages" --jq '.html_url'

      - name: Verify GitHub Pages endpoint
        if: env.SKIP_SITE_PUBLISH != 'true'
        env:
          GH_TOKEN: ${{ secrets.PAGES_ADMIN_TOKEN || secrets.CODEX_SECRET_UPDATE_TOKEN || github.token }}
        run: |
          set -euo pipefail
          if ! gh api "repos/${GITHUB_REPOSITORY}/pages" --jq '.html_url' > pages-url.txt; then
            echo "::error title=GitHub Pages is not enabled::The site branch was published, but GitHub Pages is still disabled or this token cannot read it. Add PAGES_ADMIN_TOKEN with repository Administration: read/write permission, or enable Pages once in repository Settings > Pages using branch gh-pages / root."
            exit 1
          fi
          page_url="$(cat pages-url.txt)"
          echo "GitHub Pages configured at ${page_url}"
