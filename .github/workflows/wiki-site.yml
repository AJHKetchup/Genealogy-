name: Publish Wiki Site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "wiki/**"
      - "research/**"
      - "src/historic_doc_ingest/**"
      - "pyproject.toml"
      - ".github/workflows/wiki-site.yml"
  schedule:
    - cron: "41 * * * *"
  workflow_run:
    workflows:
      - Internal Research Agents
    types:
      - completed

concurrency:
  group: wiki-site
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish-site:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install -e .

      - name: Refresh wiki indexes
        env:
          PYTHONPATH: src
        run: |
          python -m historic_doc_ingest.genealogy_wiki index --root .
          python -m historic_doc_ingest.genealogy_wiki graph --root .
          python -m historic_doc_ingest.genealogy_wiki tree --root .

      - name: Build static wiki site
        env:
          PYTHONPATH: src
        run: python -m historic_doc_ingest.genealogy_wiki site --root . --out site --wiki-only

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
