name: Publish Wiki Site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "wiki/**"
      - "research/**"
      - "src/historic_doc_ingest/**"
      - "scripts/build-wiki-site-worker.mjs"
      - "cloudflare/wiki-site/**"
      - "pyproject.toml"
      - ".github/workflows/wiki-site.yml"
  schedule:
    - cron: "41 * * * *"
  workflow_run:
    workflows:
      - Internal Research Agents
    types:
      - completed

# Site publishes are intentionally independent from conversion and research runs.
# A freshness check below prevents stale builds from deploying over newer main.

permissions:
  contents: read

jobs:
  publish-site:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install project
        run: python -m pip install -e .

      - name: Refresh wiki indexes
        env:
          PYTHONPATH: src
        run: |
          python -m historic_doc_ingest.genealogy_wiki index --root .
          python -m historic_doc_ingest.genealogy_wiki graph --root .
          python -m historic_doc_ingest.genealogy_wiki tree --root .

      - name: Build static wiki site
        env:
          PYTHONPATH: src
        run: python -m historic_doc_ingest.genealogy_wiki site --root . --out site --wiki-only

      - name: Build Cloudflare Worker bundle
        run: node scripts/build-wiki-site-worker.mjs site site-worker/index.mjs

      - name: Check site publish freshness
        run: |
          set -euo pipefail
          latest="$(git ls-remote origin refs/heads/main | cut -f1)"
          current="$(git rev-parse HEAD)"
          if [ "$current" != "$latest" ]; then
            echo "SKIP_SITE_PUBLISH=true" >> "$GITHUB_ENV"
            echo "Skipping site publish because this run built $current but main is now $latest."
          else
            echo "SKIP_SITE_PUBLISH=false" >> "$GITHUB_ENV"
          fi

      - name: Deploy Cloudflare Worker site
        if: env.SKIP_SITE_PUBLISH != 'true'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.R2_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::error title=Missing Cloudflare account secret::Add CLOUDFLARE_ACCOUNT_ID or R2_ACCOUNT_ID to repository Actions secrets."
            exit 1
          fi
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error title=Missing Cloudflare deploy token::Add CLOUDFLARE_API_TOKEN to repository Actions secrets with Workers edit permission."
            exit 1
          fi
          npx wrangler@latest deploy --config cloudflare/wiki-site/wrangler.embedded.jsonc

      - name: Verify deployed Worker site
        if: env.SKIP_SITE_PUBLISH != 'true'
        run: |
          set -euo pipefail
          tree_url="https://genealogy-wiki-site.ajh-genealogy.workers.dev/tree"
          profile_url="https://genealogy-wiki-site.ajh-genealogy.workers.dev/people/dario-arturo-pulgar-smith"
          timeline_url="https://genealogy-wiki-site.ajh-genealogy.workers.dev/timeline"
          for attempt in $(seq 1 12); do
            tree_body="$(curl -fsSL "$tree_url" || true)"
            profile_body="$(curl -fsSL "$profile_url" || true)"
            timeline_body="$(curl -fsSL "$timeline_url" || true)"
            if printf '%s' "$tree_body" | grep -q "Family Tree" \
              && printf '%s' "$tree_body" | grep -q "Alexander John Heinz" \
              && printf '%s' "$profile_body" | grep -q "Dario Arturo Pulgar-Smith" \
              && printf '%s' "$timeline_body" | grep -q "People To Place On The Timeline"; then
              echo "Verified family tree at $tree_url, pretty profile at $profile_url, and sparse timeline anchors at $timeline_url"
              exit 0
            fi
            echo "Waiting for deployed family tree to refresh (attempt $attempt/12)."
            sleep 10
          done
          echo "::error title=Worker site verification failed::The deployed Worker did not return the expected family tree, person profile, and timeline anchor content."
          exit 1
