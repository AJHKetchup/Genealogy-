name: Publish Wiki Site

on:
  workflow_dispatch:

concurrency:
  group: wiki-site
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish-site:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install -e .

      - name: Refresh wiki indexes
        env:
          PYTHONPATH: src
        run: |
          python -m historic_doc_ingest.genealogy_wiki index --root .
          python -m historic_doc_ingest.genealogy_wiki graph --root .
          python -m historic_doc_ingest.genealogy_wiki tree --root .

      - name: Build static wiki site
        env:
          PYTHONPATH: src
        run: python -m historic_doc_ingest.genealogy_wiki site --root . --out site --wiki-only

      - name: Publish site branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cd site
          touch .nojekyll
          git init -b gh-pages
          git add -A
          git commit -m "Publish family wiki site"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages:gh-pages

      - name: Configure GitHub Pages for site branch
        env:
          GH_TOKEN: ${{ secrets.PAGES_ADMIN_TOKEN || secrets.CODEX_SECRET_UPDATE_TOKEN || github.token }}
        run: |
          set +e
          gh api "repos/${GITHUB_REPOSITORY}/pages" >/dev/null 2>&1
          existing=$?
          if [ "$existing" -eq 0 ]; then
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/pages" \
              -f "source[branch]=gh-pages" \
              -f "source[path]=/" \
              -f build_type=legacy >/dev/null 2>&1
            configured=$?
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/pages" \
              -f "source[branch]=gh-pages" \
              -f "source[path]=/" \
              -f build_type=legacy >/dev/null 2>&1
            configured=$?
          fi
          if [ "$configured" -ne 0 ]; then
            echo "::warning title=GitHub Pages not enabled::Published gh-pages, but this token cannot enable Pages. Add PAGES_ADMIN_TOKEN with repository administration/pages permission, or enable Pages once for branch gh-pages / root."
          fi
